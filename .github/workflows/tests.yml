name: Tests

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Moss build outputs
        uses: actions/cache@v4
        with:
          path: |
            runtime/target
            ~/.moss/bin
          key: ${{ runner.os }}-moss-${{ hashFiles('runtime/Cargo.toml', 'runtime/Cargo.lock', 'compiler/moss.py', 'examples/**/*.moss', 'tests/fixtures/**/*.moss') }}
          restore-keys: |
            ${{ runner.os }}-moss-

      - name: Run tests
        run: python -m unittest discover -s tests

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="'SF Mono','Cascadia Code','Fira Code',Menlo,Consolas,monospace" role="img" aria-label="MOSS">
  <defs>
    <linearGradient id="moss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"  stop-color="#a4d65e"/>
      <stop offset="0.5" stop-color="#5a9e3a"/>
      <stop offset="1"  stop-color="#2f5d2a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="760" height="300" fill="#0d140d"/>

  <!-- spore speckle -->
  <g fill="#3a6b32" opacity="0.5">
    <circle cx="70"  cy="40"  r="1.5"/>
    <circle cx="690" cy="55"  r="1.5"/>
    <circle cx="130" cy="255" r="1.5"/>
    <circle cx="620" cy="240" r="1.5"/>
    <circle cx="380" cy="30"  r="1.2"/>
    <circle cx="40"  cy="160" r="1.2"/>
    <circle cx="725" cy="170" r="1.2"/>
  </g>

  <g fill="url(#moss)" filter="url(#glow)" font-size="28" font-weight="700"
     xml:space="preserve" letter-spacing="0">
    <text x="380" y="100" text-anchor="middle">███╗   ███╗ ██████╗ ███████╗███████╗</text>
    <text x="380" y="128" text-anchor="middle">████╗ ████║██╔═══██╗██╔════╝██╔════╝</text>
    <text x="380" y="156" text-anchor="middle">██╔████╔██║██║   ██║███████╗███████╗</text>
    <text x="380" y="184" text-anchor="middle">██║╚██╔╝██║██║   ██║╚════██║╚════██║</text>
    <text x="380" y="212" text-anchor="middle">██║ ╚═╝ ██║╚██████╔╝███████║███████║</text>
    <text x="380" y="240" text-anchor="middle">╚═╝     ╚═╝ ╚═════╝ ╚══════╝╚══════╝</text>
  </g>

  <text x="380" y="290" text-anchor="middle" fill="#6f9c5a" font-size="13"
        letter-spacing="6">READS  LIKE  ENGLISH · COMPILES  TO  RUST</text>
</svg>
